name: Python Tools - Lint & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check tools/ frameworks/

      - name: Run Tests
        run: pytest --doctest-modules tools/ frameworks/ --maxfail=3
