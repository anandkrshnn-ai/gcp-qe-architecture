# Cloud Build Quality Gates
# This reference implementation shows a 5-step pipeline that enforces Quality Gates.

steps:
  # Gate 1: Code Quality & Static Analysis
  - name: 'sonarsource/sonar-scanner-cli'
    id: 'static-code-analysis'
    args:
      - '-Dsonar.projectKey=my-gcp-service'
      - '-Dsonar.sources=.'
      - '-Dsonar.host.url=https://sonarcloud.io'
    waitFor: ['-']

  # Gate 1: Unit Testing
  - name: 'python:3.10'
    id: 'unit-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        pytest --cov=. --cov-fail-under=80
    waitFor: ['static-code-analysis']

  # Gate 2: Policy as Code (Rego/OPA validation)
  - name: 'openpolicyagent/conftest'
    id: 'policy-validation'
    args:
      - 'test'
      - 'k8s/*.yaml'
      - '-p'
      - 'policies/quality-gate-policies.rego'
    waitFor: ['unit-tests']

  # Gate 3: Deploy to Staging Environment
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-staging'
    args:
      - 'run'
      - 'deploy'
      - 'my-service-staging'
      - '--image=gcr.io/$PROJECT_ID/my-service:$COMMIT_SHA'
      - '--region=us-central1'
    waitFor: ['policy-validation']

  # Gate 4: NFR Validation - Performance Test
  - name: 'grafana/k6'
    id: 'performance-test'
    args:
      - 'run'
      - 'tests/load_test.js'
    env:
      - 'TARGET_URL=https://staging.api.example.com'
    waitFor: ['deploy-staging']

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/my-service:$COMMIT_SHA'
