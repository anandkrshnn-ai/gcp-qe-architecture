site_name: GCP QE Architecture
site_description: Practical Quality Engineering patterns for GCP (GKE, Cloud Run, Cloud SQL, Observability)
site_author: Anandakrishnan Damodaran
repo_name: gcp-qe-architecture
repo_url: https://github.com/anandkrshnn-ai/gcp-qe-architecture

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: README.md
  - Incident Analyzer (PoC):
    - Demo Script: run_demo.py
    - Core Logic: frameworks/Safety_core/client.py
  - Terraform Baseline: terraform/README.md
  - Engineering Guides:
    - GKE Testing: guides/gke-testing-guide.md
    - Cloud Run: guides/cloud-run-quality-guide.md
    - Cloud SQL: guides/cloud-sql-resilience-guide.md
    - Security QA: guides/security-qa-guide.md
    - SLO/SLI Engineering: guides/02-slo-sli-engineering.md
    - Production Readiness: guides/03-production-readiness.md
    - Deployment Path: guides/08-deployment-path.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - footnotes
  - attr_list
  - md_in_html
